<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>PneumoAI — Register</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{--bg:#060d1a;--teal:#00d4e8;--teal2:#00b4c8;--white:#f0f4f8;--gray:#6b7f96;--border:rgba(0,212,232,0.18);--red:#ff4d6d}
html,body{height:100%;font-family:'DM Sans',sans-serif;background:var(--bg);color:var(--white);overflow:hidden}
.scene{position:fixed;inset:0;z-index:0;overflow:hidden}
.scene-bg{position:absolute;inset:0;background:radial-gradient(ellipse 80% 60% at 80% 50%,rgba(0,100,120,0.15) 0%,transparent 60%),linear-gradient(160deg,#060d1a 0%,#080f1e 50%,#060c18 100%)}
.grid{position:absolute;inset:0;background-image:linear-gradient(rgba(0,212,232,0.04) 1px,transparent 1px),linear-gradient(90deg,rgba(0,212,232,0.04) 1px,transparent 1px);background-size:48px 48px}
.scan-line{position:absolute;left:0;right:0;height:2px;background:linear-gradient(90deg,transparent,rgba(0,212,232,0.6),transparent);animation:scanDown 5s linear infinite;top:-2px}
@keyframes scanDown{from{top:-2px}to{top:100%}}
.pulse{position:absolute;border-radius:50%;border:1px solid rgba(0,212,232,0.08);animation:po 5s ease-out infinite}
.pulse:nth-child(1){width:500px;height:500px;right:-150px;top:50%;transform:translateY(-50%);animation-delay:0s}
.pulse:nth-child(2){width:300px;height:300px;right:-50px;top:50%;transform:translateY(-50%);animation-delay:2s}
@keyframes po{0%{opacity:0.5;transform:translateY(-50%) scale(0.9)}100%{opacity:0;transform:translateY(-50%) scale(1.3)}}
.ecg{position:absolute;bottom:40px;left:0;width:100%;height:60px;opacity:0.2}
.ecg svg{width:200%;animation:ecgSlide 4s linear infinite}
@keyframes ecgSlide{from{transform:translateX(0)}to{transform:translateX(-50%)}}
.layout{position:relative;z-index:1;display:flex;height:100vh;align-items:center;justify-content:center}
.card{width:100%;max-width:520px;padding:50px 48px;background:rgba(6,13,26,0.7);border:1px solid var(--border);border-radius:24px;backdrop-filter:blur(20px)}
.brand{text-align:center;margin-bottom:32px}
.brand-icon{width:56px;height:56px;border-radius:16px;background:linear-gradient(135deg,var(--teal),var(--teal2));display:flex;align-items:center;justify-content:center;margin:0 auto 14px;box-shadow:0 0 40px rgba(0,212,232,0.3)}
.brand-icon svg{width:28px;height:28px;fill:white}
.brand h1{font-family:'Syne',sans-serif;font-size:26px;font-weight:800}
.brand p{color:var(--teal);font-size:11px;letter-spacing:3px;margin-top:3px}
.tabs{display:flex;background:rgba(255,255,255,0.04);border-radius:12px;padding:4px;margin-bottom:28px;border:1px solid var(--border)}
.tab{flex:1;text-align:center;padding:10px;border-radius:9px;font-size:13px;font-weight:600;cursor:pointer;transition:all 0.25s;color:var(--gray);text-decoration:none;font-family:'DM Sans',sans-serif}
.tab.active{background:linear-gradient(135deg,var(--teal),var(--teal2));color:#060d1a;box-shadow:0 4px 20px rgba(0,212,232,0.3)}
.row{display:grid;grid-template-columns:1fr 1fr;gap:16px}
.field{margin-bottom:18px}
.field label{display:block;font-size:11px;font-weight:600;color:var(--teal);letter-spacing:2px;text-transform:uppercase;margin-bottom:7px}
.input-wrap{position:relative}
.field-icon{position:absolute;left:13px;top:50%;transform:translateY(-50%);color:rgba(0,212,232,0.4);width:15px;height:15px}
.field input{width:100%;background:rgba(255,255,255,0.04);border:1.5px solid rgba(255,255,255,0.08);border-radius:11px;padding:13px 13px 13px 40px;color:var(--white);font-size:14px;font-family:'DM Sans',sans-serif;outline:none;transition:all 0.25s}
.field input::placeholder{color:rgba(255,255,255,0.2)}
.field input:focus{border-color:var(--teal);background:rgba(0,212,232,0.04);box-shadow:0 0 0 3px rgba(0,212,232,0.08)}
.btn-submit{width:100%;padding:14px;background:linear-gradient(135deg,var(--teal),var(--teal2));border:none;border-radius:12px;color:#060d1a;font-size:15px;font-weight:700;font-family:'Syne',sans-serif;cursor:pointer;transition:all 0.25s;letter-spacing:1px;margin-top:6px}
.btn-submit:hover{transform:translateY(-2px);box-shadow:0 8px 30px rgba(0,212,232,0.4)}
.error-box{background:rgba(255,77,109,0.1);border:1px solid rgba(255,77,109,0.3);border-radius:10px;padding:12px 16px;color:#ff9eb5;font-size:13px;margin-bottom:18px;display:flex;align-items:center;gap:8px}
.error-box svg{fill:#ff9eb5;flex-shrink:0}
.form-footer{text-align:center;margin-top:20px;font-size:13px;color:var(--gray)}
.form-footer a{color:var(--teal);text-decoration:none;font-weight:600}
.terms{text-align:center;font-size:11px;color:rgba(255,255,255,0.25);margin-top:14px}
@media(max-width:600px){.card{padding:32px 20px}.row{grid-template-columns:1fr}}
</style>
</head>
<body>
<div class="scene">
  <div class="scene-bg"></div><div class="grid"></div>
  <div class="scan-line"></div>
  <div class="pulse"></div><div class="pulse"></div>
  <div class="ecg">
    <svg viewBox="0 0 1200 60" preserveAspectRatio="none" style="height:60px">
      <polyline points="0,30 80,30 100,30 110,8 120,52 130,30 140,30 220,30 240,30 250,4 260,56 270,30 280,30 360,30 380,30 390,8 400,52 410,30 420,30 500,30 520,30 530,4 540,56 550,30 560,30 640,30 660,30 670,8 680,52 690,30 700,30 780,30 800,30 810,4 820,56 830,30 840,30 920,30 940,30 950,8 960,52 970,30 980,30 1060,30 1080,30 1090,4 1100,56 1110,30 1120,30 1200,30"
        fill="none" stroke="rgba(0,212,232,0.9)" stroke-width="1.5"/>
    </svg>
  </div>
</div>
<div class="layout">
  <div class="card">
    <div class="brand">
      <div class="brand-icon"><svg viewBox="0 0 24 24"><path d="M19 3H5c-1.1 0-2 .9-2 2v14c0 1.1.9 2 2 2h14c1.1 0 2-.9 2-2V5c0-1.1-.9-2-2-2zm-7 14l-5-5 1.41-1.41L12 14.17l7.59-7.59L21 8l-9 9z"/></svg></div>
      <h1>PneumoAI</h1>
      <p>CREATE ACCOUNT</p>
    </div>
    <div class="tabs">
      <a href="/login" class="tab">Sign In</a>
      <a href="/register" class="tab active">Register</a>
    </div>
    {% if error %}
    <div class="error-box">
      <svg width="16" height="16" viewBox="0 0 24 24"><path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm1 15h-2v-2h2v2zm0-4h-2V7h2v6z"/></svg>
      {{ error }}
    </div>
    {% endif %}
    <form method="POST">
      <div class="field">
        <label>Full Name</label>
        <div class="input-wrap">
          <svg class="field-icon" viewBox="0 0 24 24" fill="currentColor"><path d="M12 12c2.21 0 4-1.79 4-4s-1.79-4-4-4-4 1.79-4 4 1.79 4 4 4zm0 2c-2.67 0-8 1.34-8 4v2h16v-2c0-2.66-5.33-4-8-4z"/></svg>
          <input type="text" name="name" placeholder="Dr. John Smith" required>
        </div>
      </div>
      <div class="field">
        <label>Email Address</label>
        <div class="input-wrap">
          <svg class="field-icon" viewBox="0 0 24 24" fill="currentColor"><path d="M20 4H4c-1.1 0-2 .9-2 2v12c0 1.1.9 2 2 2h16c1.1 0 2-.9 2-2V6c0-1.1-.9-2-2-2zm0 4l-8 5-8-5V6l8 5 8-5v2z"/></svg>
          <input type="email" name="email" placeholder="doctor@hospital.com" required>
        </div>
      </div>
      <div class="row">
        <div class="field">
          <label>Password</label>
          <div class="input-wrap">
            <svg class="field-icon" viewBox="0 0 24 24" fill="currentColor"><path d="M18 8h-1V6c0-2.76-2.24-5-5-5S7 3.24 7 6v2H6c-1.1 0-2 .9-2 2v10c0 1.1.9 2 2 2h12c1.1 0 2-.9 2-2V10c0-1.1-.9-2-2-2zm-6 9c-1.1 0-2-.9-2-2s.9-2 2-2 2 .9 2 2-.9 2-2 2zm3.1-9H8.9V6c0-1.71 1.39-3.1 3.1-3.1s3.1 1.39 3.1 3.1v2z"/></svg>
            <input type="password" name="password" placeholder="••••••••" required>
          </div>
        </div>
        <div class="field">
          <label>Confirm</label>
          <div class="input-wrap">
            <svg class="field-icon" viewBox="0 0 24 24" fill="currentColor"><path d="M18 8h-1V6c0-2.76-2.24-5-5-5S7 3.24 7 6v2H6c-1.1 0-2 .9-2 2v10c0 1.1.9 2 2 2h12c1.1 0 2-.9 2-2V10c0-1.1-.9-2-2-2zm-6 9c-1.1 0-2-.9-2-2s.9-2 2-2 2 .9 2 2-.9 2-2 2zm3.1-9H8.9V6c0-1.71 1.39-3.1 3.1-3.1s3.1 1.39 3.1 3.1v2z"/></svg>
            <input type="password" name="confirm_password" placeholder="••••••••" required>
          </div>
        </div>
      </div>
      <button type="submit" class="btn-submit">CREATE ACCOUNT →</button>
    </form>
    <p class="terms">For authorized medical use only. By registering you agree to use this system responsibly.</p>
    <div class="form-footer">Already have an account? <a href="/login">Sign in →</a></div>
  </div>
</div>
</body>
</html>
